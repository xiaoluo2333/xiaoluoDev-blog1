# 喵～ 这是 JAR 包内部的默认配置，使用 .properties 格式
# 外部 config/blog.yml 的配置会覆盖这里的同名配置
# 所以想改配置的话去外面的 yml 文件改就好啦

server.port=8080

# MySQL 数据库配置喵～
spring.datasource.url=jdbc:mysql://localhost:3306/xiaoluoDev_blog_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=35433123f
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置：自动创建/更新表结构，省得手动建表啦
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf 模板配置
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# JWT 配置喵～
jwt.secret=XiaoluoDevBlogSecretKeyForJWTTokenGenerationAndValidation2024
jwt.user-expiration=604800000