# 喵～ HelloWorld 插件的身份证！
# 这个文件告诉插件系统：
# 我是谁、从哪里来、要到哪里去（划掉）
# 总之就是插件的元数据信息啦～

# 插件名称（给人看的，可以包含空格和特殊字符）
name: HelloWorld

# 插件唯一标识符（给系统用的，只能包含小写字母和连字符）
# 在整个插件系统里必须是唯一的喵～
id: hello-world

# 插件版本号（遵循语义化版本规范）
version: 1.0.0

# 插件作者（是哪个伟大的开发者创造了这个插件呢～）
author: Xiaoluo

# 插件描述（简单说明这个插件是做什么用的）
description: 一个简单的示例插件，用来演示插件系统怎么用喵～

# 插件主类（实现了 Plugin 接口的类的全限定名）
# 系统会加载这个类并实例化，然后调用它的生命周期方法
main: xl.xldevblog.hello.HelloWorldPlugin